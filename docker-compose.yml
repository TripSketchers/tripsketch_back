version: '3.8'

services:
  backend:
    image: tripsketch-backend:latest
    container_name: tripsketch-app

    build:
      context: .
      dockerfile: Dockerfile

    # [보안 격리] 외부 포트 노출(8080:8080)을 제거했습니다.
    # 이제 외부 요청은 Caddy가 안전하게 받아서 내부적으로 8080에 토스합니다.

    environment:
      # RDS(MySQL) 접속 정보
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=${DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      # 시크릿/키들
      - FIREBASE_CONFIG=${FIREBASE_CONFIG}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - KAKAO_CLIENT_SECRET=${KAKAO_CLIENT_SECRET}
      - KAKAO_REST_API_KEY=${KAKAO_REST_API_KEY}
      - NAVER_CLIENT_SECRET=${NAVER_CLIENT_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}

    restart: always
    networks:
      - tripsketch-net

  caddy:
    image: caddy:2-alpine
    container_name: tripsketch-caddy
    restart: always
    # 외부 세계와 통신할 HTTP, HTTPS 포트 개방
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - ./logs/caddy:/var/log/caddy
    # 백엔드가 먼저 정상 구동된 후 Caddy가 켜지도록 보장
    depends_on:
      - backend
    networks:
      - tripsketch-net

networks:
  tripsketch-net:
    driver: bridge

# Caddy가 자동 발급받은 SSL 인증서가 컨테이너 재부팅 시 사라지지 않도록 볼륨 지정
volumes:
  caddy_data:
  caddy_config: